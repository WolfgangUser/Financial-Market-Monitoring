<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Market Monitor{% endblock %} | {{ page_title|default:'Dashboard' }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="nav-brand">
                <span class="brand-icon">📈</span>
                Market Monitor
            </a>
            <ul class="nav-menu">
                <li><a href="{% url 'home' %}" class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">Dashboard</a></li>
                <li><a href="{% url 'assets-list' %}" class="nav-link {% if request.resolver_match.url_name == 'assets-list' %}active{% endif %}">Assets</a></li>
                <li><a href="{% url 'news' %}" class="nav-link {% if request.resolver_match.url_name == 'news' %}active{% endif %}">News</a></li>
                <li><a href="{% url 'watchlists' %}" class="nav-link {% if request.resolver_match.url_name == 'watchlists' %}active{% endif %}">Watchlists</a></li>
            </ul>
            <div class="nav-actions">
                <a href="/admin/" class="btn btn-outline">Admin</a>
                <a href="/api/" class="btn btn-primary">API</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2024 Market Monitor. Real-time financial market monitoring.</p>
            <div class="footer-links">
                <a href="/api/">API Documentation</a>
                <a href="/admin/">Admin Panel</a>
            </div>
        </div>
    </footer>

    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
